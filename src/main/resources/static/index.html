<body>

<script>

<h1>Music Quiz</h1>

<!-- Genre -->
<label for="genre">Vælg genre:</label>
<select id="genre">
    <option value="pop">Pop</option>
    <option value="rock">Rock</option>

    <option value="edm">EDM</option>
</select>

    <option value="1990">1990'erne</option>

<button onclick="startQuiz()">Start Quiz</button>

<div id="quiz"></div>
