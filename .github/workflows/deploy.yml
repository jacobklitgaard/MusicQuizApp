name: Deploy to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Sæt Java op
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Byg og test med Maven
        run: mvn --batch-mode test

      - name: Log ind på Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Byg og push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: jacobklitgaard/musicquiz:1.0

      - name: Deploy til Azure
        run: |
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no jacobklitgaard@${{ secrets.VM_HOST }} "
            docker pull jacobklitgaard/musicquiz:1.0 &&
            docker stop musicquiz || true &&
            docker rm musicquiz || true &&
            docker run -d --name musicquiz -p 8080:8080 jacobklitgaard/musicquiz:1.0
          "