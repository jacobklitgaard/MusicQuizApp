name: Deploy to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Sæt Java op
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Byg og test med Maven
        run: mvn --batch-mode test

      - name: Log ind på Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Byg og push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: jacobklitgaard/musicquiz:1.0

      - name: Deploy til Azure VM
        run: |
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no azureuser@${{ secrets.VM_HOST }} "
            cd /home/azureuser/musicquiz &&
            echo 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' > .env &&
            docker-compose pull &&
            docker-compose up -d
          "
