name: Deploy to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Log ind på Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Byg og push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: jacobklitgaard/musicquiz:1.0

      - name: Test forbindelse
        run: nc -zv 20.251.162.59 22

      - name: Deploy til Azure VM
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no azureuser@${{ secrets.VM_HOST }} "
            docker rm -f musicquiz || true
            docker pull jacobklitgaard/musicquiz:1.0
            docker run -d --name musicquiz -p 8080:8080 -e 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' jacobklitgaard/musicquiz:1.0
          "
