name: Deploy to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Log ind på Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Byg og push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: jacobklitgaard/musicquiz:1.0

      - name: Test forbindelse
        run: nc -zv 20.251.162.59 22

      - name: Deploy til Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          debug: true
          script: |
            docker rm -f musicquiz || true
            docker pull jacobklitgaard/musicquiz:1.0
            docker run -d \
              --name musicquiz \
              -p 8080:8080 \
              -e "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
              jacobklitgaard/musicquiz:1.0