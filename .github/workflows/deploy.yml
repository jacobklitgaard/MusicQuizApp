name: Deploy to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v3

      - name: Log ind på Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Byg og push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: jacobklitgaard/musicquiz:1.0

      - name: Test forbindelse
        run: nc -zv 20.251.162.59 22

      - name: Debug nøgle
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | head -1
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tail -1

      - name: Debug nøgle format
        run: |
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          cat /tmp/deploy_key | wc -l
          head -1 /tmp/deploy_key
          tail -1 /tmp/deploy_key
          ssh-keygen -l -f /tmp/deploy_key
